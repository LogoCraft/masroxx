<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Management Vault PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020202;
            color: white;
            overflow-x: hidden;
        }

        .text-outline {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            color: transparent;
        }

        .led-pulse {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
        }

        .scanline {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 128, 0.01));
            background-size: 100% 2px, 3px 100%;
        }

        #mouse-follower {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.15) 0%, rgba(34, 197, 94, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            filter: blur(80px);
        }

        select option {
            background-color: #0a0a0a;
            color: white;
        }
    </style>
</head>
<body>
    <div id="mouse-follower"></div>

    <div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0">
        <div class="absolute top-[10%] left-[5%] w-[500px] h-[500px] bg-blue-600/10 blur-[150px] rounded-full led-pulse"></div>
        <div class="absolute bottom-[10%] right-[5%] w-[600px] h-[600px] bg-purple-600/10 blur-[180px] rounded-full led-pulse" style="animation-delay: 2s;"></div>
        <div class="absolute inset-0 scanline opacity-30"></div>
    </div>

    <div class="relative z-10 max-w-7xl mx-auto px-6 py-12">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-8 mb-20">
            <div>
                <div class="flex items-center gap-3 mb-3">
                    <div class="h-[2px] w-12 bg-gradient-to-r from-white to-transparent"></div>
                    <span class="text-[10px] font-bold tracking-[0.4em] uppercase text-blue-400">Cybernetic Vault</span>
                </div>
                <h1 class="text-6xl md:text-8xl font-black tracking-tighter leading-none">
                    AI<span class="text-outline">VAULT</span>
                </h1>
                <p class="mt-6 text-gray-500 max-w-sm text-sm border-l border-white/10 pl-4">
                    API açarları və ideyalar üçün hazırlanmış <span class="text-white">üstün səviyyəli</span> saxlanc.
                </p>
            </div>
            
            <div id="session-badge" class="bg-black border border-white/10 px-6 py-3 rounded-full flex items-center gap-4 backdrop-blur-xl">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500 shadow-[0_0_10px_#eab308]"></div>
                <span class="text-[10px] font-mono opacity-80 uppercase tracking-[0.2em]" id="user-id-display">BAĞLANIR...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-4">
                <div class="sticky top-12 p-8 rounded-[2rem] bg-[#0a0a0a]/90 border border-white/10 backdrop-blur-3xl shadow-2xl">
                    <h2 class="text-2xl font-bold mb-8 flex items-center gap-3">
                        <i data-lucide="plus" class="text-blue-400"></i> Giriş Paneli
                    </h2>
                    
                    <form id="vault-form" class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-[0.2em] text-white/40 ml-1">Obyektin Adı</label>
                            <input type="text" id="title" required placeholder="Məs: GPT-4 Key" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500/50 transition-all text-sm">
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-[0.2em] text-white/40 ml-1">Kateqoriya</label>
                            <select id="category" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500/50 transition-all text-sm cursor-pointer">
                                <option value="api">🔑 API Açarı</option>
                                <option value="model">🧠 AI Modeli</option>
                                <option value="idea">📄 Fikir / Qeyd</option>
                                <option value="other">⚙️ Digər</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-[0.2em] text-white/40 ml-1">Məlumat</label>
                            <textarea id="content" required placeholder="Məlumatı bura daxil edin..." rows="5" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500/50 transition-all resize-none text-sm"></textarea>
                        </div>

                        <button type="submit" class="w-full py-5 bg-white text-black font-black rounded-2xl hover:scale-[1.01] active:scale-95 transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] flex items-center justify-center gap-2 uppercase tracking-widest text-xs">
                            <i data-lucide="zap" class="w-4 h-4"></i> Yadda Saxla
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="items-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // UI Elementləri
        const follower = document.getElementById('mouse-follower');
        const form = document.getElementById('vault-form');
        const container = document.getElementById('items-container');

        // Mouse Takip
        document.addEventListener('mousemove', (e) => {
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        // Firebase Konfiqurasiyası
        const firebaseConfig = {
            apiKey: "AIzaSyBHyVTGfOCL_QhDm3iQSp_zkhwtDq-Pz54",
            authDomain: "alsat-20afb.firebaseapp.com",
            databaseURL: "https://alsat-20afb-default-rtdb.firebaseio.com",
            projectId: "alsat-20afb",
            storageBucket: "alsat-20afb.firebasestorage.app",
            messagingSenderId: "675661559230",
            appId: "1:675661559230:web:5401e1aee6ccd775caf5ef"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'ai-vault-pro';

        let currentUser = null;
        let isLocalMode = false;

        const updateUIStatus = (id, colorClass, shadowColor) => {
            const display = document.getElementById('user-id-display');
            const dot = document.getElementById('status-dot');
            display.innerText = id;
            dot.className = `w-2 h-2 rounded-full ${colorClass}`;
            dot.style.boxShadow = `0 0 10px ${shadowColor}`;
        };

        // Firebase-də problem olarsa yerli yaddaşa keçid
        const enableLocalMode = () => {
            isLocalMode = true;
            const fallbackId = "OFFLINE_USER";
            currentUser = { uid: fallbackId };
            updateUIStatus(`LOKAL REJİM: ${fallbackId}`, "bg-red-500", "#ef4444");
            renderVaultItems(getLocalData());
        };

        const getLocalData = () => JSON.parse(localStorage.getItem('vault_local') || '[]');
        const saveLocalData = (data) => localStorage.setItem('vault_local', JSON.stringify(data));

        const initAuth = async () => {
            try {
                // Əgər Authentication admin tərəfindən məhdudlaşdırılıbsa (xətanın səbəbi), catch-ə düşəcək
                await signInAnonymously(auth);
            } catch (err) {
                console.warn("Firebase Auth xətası: Giriş məhdudlaşdırılıb. Lokal rejimə keçilir.", err);
                enableLocalMode();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user && !isLocalMode) {
                currentUser = user;
                updateUIStatus(`SECURE_ID: ${user.uid.substring(0, 10)}`, "bg-green-500", "#22c55e");
                listenToVault();
            }
        });

        const getIcon = (cat) => {
            const icons = { api: 'key', model: 'cpu', idea: 'file-text' };
            return icons[cat] || 'settings';
        };

        const renderVaultItems = (items) => {
            container.innerHTML = '';
            if (items.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-20 opacity-30 italic">Hələ ki, məlumat yoxdur...</div>';
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = "group relative p-8 rounded-[2.5rem] bg-gradient-to-br from-white/[0.05] to-transparent border border-white/5 transition-all duration-500 hover:border-blue-500/30";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="p-3 rounded-2xl bg-white/5">
                            <i data-lucide="${getIcon(item.category)}" class="w-5 h-5"></i>
                        </div>
                        <button data-id="${item.id}" class="delete-btn p-2 text-white/10 hover:text-red-500 hover:bg-red-500/10 rounded-xl transition-all">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <h3 class="text-xl font-bold mb-4 tracking-tight group-hover:text-blue-400 transition-colors">${item.title}</h3>
                    <p class="text-sm text-white/60 font-mono leading-relaxed break-all bg-black/40 p-4 rounded-2xl border border-white/5">${item.content}</p>
                    <div class="mt-8 pt-6 border-t border-white/5 flex items-center justify-between">
                        <span class="text-[9px] font-black text-white/20 uppercase tracking-[0.3em]">${item.category}</span>
                        <i data-lucide="lock" class="w-3 h-3 opacity-20"></i>
                    </div>
                `;
                container.appendChild(card);
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = () => window.deleteItem(btn.dataset.id);
            });
            lucide.createIcons();
        };

        function listenToVault() {
            if (!currentUser || isLocalMode) return;
            const vaultRef = collection(db, 'artifacts', appId, 'public', 'data', 'vault_items');
            
            onSnapshot(vaultRef, (snapshot) => {
                const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderVaultItems(docs);
            }, (err) => {
                console.warn("Firestore oxuma xətası (İcazə yoxdur). Lokal rejim aktiv edilir.");
                enableLocalMode();
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            
            const newItem = {
                id: Date.now().toString(),
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                category: document.getElementById('category').value,
                userId: currentUser.uid,
                createdAt: serverTimestamp() || { seconds: Date.now() / 1000 }
            };

            if (isLocalMode) {
                const data = getLocalData();
                data.unshift(newItem);
                saveLocalData(data);
                renderVaultItems(data);
                form.reset();
            } else {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'vault_items'), newItem);
                    form.reset();
                } catch (err) { 
                    console.error("Yadda saxlanarkən xəta:", err);
                    alert("Firebase-ə yazıla bilmədi. Zəhmət olmasa icazələri yoxlayın.");
                }
            }
        });

        window.deleteItem = async (id) => {
            if (isLocalMode) {
                const data = getLocalData().filter(i => i.id !== id);
                saveLocalData(data);
                renderVaultItems(data);
            } else {
                try { 
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vault_items', id)); 
                } catch (err) { console.error("Silinərkən xəta:", err); }
            }
        };

        initAuth();
        lucide.createIcons();
    </script>
</body>
</html>
